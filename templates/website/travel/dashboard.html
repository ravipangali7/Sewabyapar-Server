{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ travel_title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #f6f7fb; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; color: #111827; }
        .travel-shell { --travel-bottom-nav-height: 56px; --travel-bottom-nav-gap: 24px; min-height: 100vh; background: #f6f7fb; }
        .travel-card { border-radius: 18px; background: linear-gradient(180deg, rgba(255,255,255,.96) 0%, rgba(248,250,255,.96) 100%); border: 1px solid #e8edf5; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); backdrop-filter: blur(4px); }
        .travel-stat { border-radius: 16px; border: 1px solid #e8edf5; background: linear-gradient(180deg, #ffffff 0%, #f7f9ff 100%); box-shadow: 0 10px 24px rgba(15, 23, 42, 0.07); }
        .travel-header { position: sticky; top: 0; z-index: 40; background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .travel-header-main { min-height: 52px; }
        .travel-drawer-backdrop { position: fixed; inset: 0; background: rgba(17, 24, 39, 0.45); z-index: 70; opacity: 0; pointer-events: none; transition: opacity .2s ease; }
        .travel-drawer-backdrop.open { opacity: 1; pointer-events: auto; }
        .travel-drawer { position: fixed; top: 0; left: 0; bottom: 0; width: min(82vw, 310px); background: #fff; z-index: 80; transform: translateX(-100%); transition: transform .2s ease; border-right: 1px solid #eceff5; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2); }
        .travel-drawer.open { transform: translateX(0); }
        .travel-bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 50; background: #fff; border-top: 1px solid #e5e7eb; }
        .travel-bottom-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-height: 56px; }
        .travel-bottom-item svg { width: 16px; height: 16px; }
        .travel-bottom-item.active { color: #dc2626; font-weight: 600; background: #fff1f2; }
        .travel-appbar-item.active { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }
        .travel-drawer-item.active { background: #fef2f2; color: #b91c1c; }
        .travel-mobile-list { display: grid; gap: 10px; }
        .travel-mobile-row { border: 1px solid #e8edf5; border-radius: 16px; background: linear-gradient(180deg, #ffffff 0%, #f9fbff 100%); box-shadow: 0 14px 28px rgba(15, 23, 42, 0.09); overflow: hidden; }
        .travel-mobile-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px; border-bottom: 1px solid #edf1f6; }
        .travel-mobile-profile { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .travel-mobile-avatar { width: 36px; height: 36px; border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); flex-shrink: 0; }
        .travel-mobile-name { font-size: 14px; font-weight: 700; color: #111827; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .travel-mobile-meta { font-size: 11px; color: #6b7280; margin-top: 2px; }
        .travel-chip { display: inline-flex; align-items: center; border-radius: 9999px; font-size: 11px; font-weight: 700; padding: 3px 9px; white-space: nowrap; }
        .travel-chip-positive { color: #166534; background: #dcfce7; border: 1px solid #86efac; }
        .travel-chip-negative { color: #991b1b; background: #fee2e2; border: 1px solid #fca5a5; }
        .travel-chip-neutral { color: #374151; background: #f3f4f6; border: 1px solid #e5e7eb; }
        .travel-mobile-sections { padding: 12px; display: grid; gap: 10px; }
        .travel-mobile-section { border: 1px solid #eef2f7; border-radius: 12px; padding: 9px; background: rgba(255, 255, 255, 0.75); }
        .travel-mobile-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #6b7280; font-weight: 700; margin-bottom: 6px; }
        .travel-mobile-item { display: flex; justify-content: space-between; gap: 8px; padding: 3px 0; font-size: 12px; }
        .travel-mobile-item-label { color: #6b7280; font-weight: 600; }
        .travel-mobile-item-value { color: #111827; text-align: right; word-break: break-word; font-weight: 600; }
        .travel-mobile-actions { border-top: 1px solid #edf1f6; padding: 10px 12px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; background: #fbfcff; }
        .travel-mobile-action-btn { border-radius: 10px; border: 1px solid #d7deea; padding: 7px 10px; font-size: 12px; font-weight: 700; text-align: center; background: #fff; color: #374151; }
        .travel-mobile-action-btn.delete { color: #991b1b; border-color: #fca5a5; background: #fff1f2; }
        #kpiGrid.kpi-scroll {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
            padding-bottom: 2px;
        }
        #kpiGrid.kpi-scroll::-webkit-scrollbar { display: none; }
        #kpiGrid.kpi-scroll .travel-stat { flex: 0 0 170px; min-width: 170px; }
        @media (max-width: 767px) {
            .travel-main {
                padding-bottom: calc(var(--travel-bottom-nav-height) + var(--travel-bottom-nav-gap) + env(safe-area-inset-bottom, 0px));
            }
        }
    </style>
</head>
<body>
<div id="travelApp" class="travel-shell" data-role="{{ travel_role }}" data-api-base="{{ api_base }}">
    <header class="travel-header text-white shadow-sm">
        <div class="max-w-7xl mx-auto px-3 md:px-4 py-2">
            <div class="travel-header-main flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                    <button id="appBarMenuBtn" class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-white/90 text-red-700 border border-red-300 md:hidden" aria-label="Menu">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4">
                            <path d="M3 6h18M3 12h18M3 18h18"/>
                        </svg>
                    </button>
                    <div id="appBarTitle" class="text-sm md:text-base font-semibold tracking-wide">Dashboard</div>
                </div>
                <div class="flex items-center gap-2">
                    <a href="{% url 'website:travel_profile' %}" class="inline-flex items-center px-2.5 py-1.5 text-xs rounded-lg bg-white/90 text-red-700 border border-red-300 font-semibold">
                        Profile
                    </a>
                    <button id="appBarBackBtn" class="hidden inline-flex items-center justify-center w-8 h-8 rounded-lg bg-white/90 text-red-700 border border-red-300" aria-label="Back">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-3 md:px-4 py-4 travel-main">
        <div class="md:flex md:gap-4">
            <aside class="hidden md:block w-64 travel-card p-3 h-fit sticky top-24">
                <div class="text-xs uppercase tracking-wide text-gray-500 mb-2">Role Menu</div>
                <nav id="desktopMenu" class="space-y-1"></nav>
            </aside>

            <section class="flex-1">
                <div id="appAlert" class="hidden mb-3 rounded-lg px-3 py-2 text-sm"></div>
                <div id="kpiGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-3"></div>
                <div class="travel-card p-2.5 md:p-3 mb-3">
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-2 mb-2.5">
                        <h2 id="panelTitle" class="text-base font-semibold text-gray-900">Operations</h2>
                        <div class="flex items-center gap-2 w-full md:w-auto">
                            <input id="searchInput" class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-full md:w-auto" placeholder="Search..." />
                            <button id="refreshBtn" class="bg-red-600 text-white px-3 py-2 rounded-lg text-sm shrink-0">Refresh</button>
                        </div>
                    </div>
                    <div id="panelActions" class="mb-3 flex flex-wrap gap-2"></div>
                    <div id="panelBody" class="overflow-x-auto"></div>
                </div>
            </section>
        </div>
    </main>

    <nav class="travel-bottom-nav md:hidden">
        <div id="bottomBarMenu" class="grid grid-cols-4 text-xs"></div>
    </nav>
</div>

<div id="drawerBackdrop" class="travel-drawer-backdrop md:hidden"></div>
<aside id="appDrawer" class="travel-drawer md:hidden">
    <div class="p-4 border-b border-gray-200 flex items-center justify-between">
        <div class="text-sm font-semibold text-gray-900">Menu</div>
        <button id="drawerCloseBtn" class="inline-flex items-center justify-center w-8 h-8 rounded-lg border border-gray-300 text-gray-600" aria-label="Close menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4">
                <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <nav id="drawerMenu" class="p-3 space-y-1"></nav>
</aside>

<div id="modalRoot" class="hidden fixed inset-0 z-[60] bg-black/40 items-center justify-center p-3">
    <div class="travel-card w-full max-w-2xl max-h-[90vh] overflow-auto">
        <div class="flex items-center justify-between border-b px-4 py-3">
            <h3 id="modalTitle" class="font-semibold">Form</h3>
            <button id="modalClose" class="text-gray-500 text-xl">&times;</button>
        </div>
        <form id="modalForm" class="p-4 space-y-3"></form>
    </div>
</div>
<script>
(function () {
    const root = document.getElementById("travelApp");
    if (!root) return;

    const role = root.dataset.role;
    const apiBase = root.dataset.apiBase || "/api/travel";
    const coreApiBase = "/api";
    const state = { session: null, tab: "dashboard", query: "", pageData: [] };

    const el = {
        alert: document.getElementById("appAlert"),
        appBarBackBtn: document.getElementById("appBarBackBtn"),
        appBarMenuBtn: document.getElementById("appBarMenuBtn"),
        appBarTitle: document.getElementById("appBarTitle"),
        desktopMenu: document.getElementById("desktopMenu"),
        drawerBackdrop: document.getElementById("drawerBackdrop"),
        appDrawer: document.getElementById("appDrawer"),
        drawerMenu: document.getElementById("drawerMenu"),
        drawerCloseBtn: document.getElementById("drawerCloseBtn"),
        bottomBarMenu: document.getElementById("bottomBarMenu"),
        kpiGrid: document.getElementById("kpiGrid"),
        panelTitle: document.getElementById("panelTitle"),
        panelActions: document.getElementById("panelActions"),
        panelBody: document.getElementById("panelBody"),
        refreshBtn: document.getElementById("refreshBtn"),
        searchInput: document.getElementById("searchInput"),
        modalRoot: document.getElementById("modalRoot"),
        modalTitle: document.getElementById("modalTitle"),
        modalForm: document.getElementById("modalForm"),
        modalClose: document.getElementById("modalClose"),
    };

    const tabsByRole = {
        travel_committee: ["dashboard", "vehicles", "bookings", "boarding", "staff", "revenue", "wallet"],
        travel_staff: ["dashboard", "bookings", "boarding", "revenue"],
        travel_dealer: ["dashboard", "bookings", "agents", "revenue", "wallet"],
        agent: ["dashboard", "bookings", "create-booking", "vehicles", "revenue", "wallet"],
    };
    const bottomBarItemsByRole = {
        travel_committee: ["dashboard", "vehicles", "bookings", "wallet", "profile"],
        travel_staff: ["dashboard", "bookings", "boarding", "revenue", "profile"],
        travel_dealer: ["dashboard", "bookings", "agents", "wallet", "profile"],
        agent: ["dashboard", "bookings", "create-booking", "wallet", "profile"],
    };
    const tabLabel = {
        dashboard: "Dashboard",
        bookings: "Bookings",
        "create-booking": "Create",
        vehicles: "Vehicles",
        boarding: "Boarding",
        staff: "Staff",
        agents: "Agents",
        revenue: "Revenue",
        wallet: "Wallet",
        profile: "Profile",
    };
    const tabIcons = {
        dashboard: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 13h8V3H3v10zm10 8h8v-6h-8v6zM3 21h8v-6H3v6zm10-10h8V3h-8v8z"/></svg>`,
        vehicles: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="8" rx="2"/><circle cx="7.5" cy="17" r="1.5"/><circle cx="16.5" cy="17" r="1.5"/></svg>`,
        bookings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>`,
        staff: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="3"/><path d="M20 8v6M23 11h-6"/></svg>`,
        wallet: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 12h4"/></svg>`,
        boarding: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M7 4v6M17 4v6M6 20l3-4h6l3 4"/></svg>`,
        revenue: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></svg>`,
        agents: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="3"/><path d="M2 21a7 7 0 0 1 14 0"/><path d="M16 11a3 3 0 1 0 0-6"/><path d="M22 21a7 7 0 0 0-4-6.3"/></svg>`,
        "create-booking": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M12 8v8M8 12h8"/></svg>`,
        profile: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>`,
    };

    const dashboardProfileFields = {
        travel_committee: ["id", "name", "logo"],
        travel_staff: ["id"],
        travel_dealer: ["id"],
        agent: ["id"],
    };

    const tableSchemas = {
        bookings: ["id", "ticket_number", "name", "phone", "status", "booking_date", "fare"],
        vehicles: ["id", "name", "vehicle_no", "from_place.name", "to_place.name", "departure_time", "is_active", "seat_price"],
        boarding: ["id", "ticket_number", "name", "phone", "status", "booking_date"],
        staff: ["id", "user.name", "user.phone", "booking_permission", "boarding_permission", "finance_permission"],
        agents: ["id", "user.name", "user.phone", "is_active", "created_at"],
        revenue: ["id", "transaction_type", "amount", "status", "description", "created_at"],
        wallet: ["section", "id", "amount", "status", "created_at", "value"],
    };

    function getCsrfToken() {
        const m = document.cookie.match(/csrftoken=([^;]+)/);
        return m ? decodeURIComponent(m[1]) : "";
    }

    async function api(path, options = {}) {
        const isFormData = options.body instanceof FormData;
        const res = await fetch(path, {
            credentials: "same-origin",
            headers: {
                ...(isFormData ? {} : { "Content-Type": "application/json" }),
                "X-CSRFToken": getCsrfToken(),
                ...(options.headers || {}),
            },
            ...options,
        });
        const isJson = (res.headers.get("content-type") || "").includes("application/json");
        const data = isJson ? await res.json() : null;
        if (!res.ok) {
            if (data) throw new Error(JSON.stringify(data));
            throw new Error(`Request failed (${res.status})`);
        }
        return data;
    }

    function showAlert(message, type) {
        el.alert.className = "mb-3 rounded-lg px-3 py-2 text-sm";
        const styles = {
            success: "bg-green-100 text-green-700 border border-green-300",
            error: "bg-red-100 text-red-700 border border-red-300",
            warning: "bg-yellow-100 text-yellow-700 border border-yellow-300",
        };
        el.alert.classList.add(...(styles[type] || styles.warning).split(" "));
        el.alert.textContent = message;
        el.alert.classList.remove("hidden");
    }

    function clearAlert() { el.alert.classList.add("hidden"); }

    function escapeHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function toIsoFromDateTimeLocal(value) {
        if (!value) return value;
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toISOString();
    }

    async function fetchOptionData(path, mapOption) {
        const data = await api(path);
        const list = Array.isArray(data) ? data : (data.results || data.data || []);
        return list.map(mapOption).filter((opt) => opt && opt.value !== undefined && opt.value !== null);
    }

    async function fetchVehicleOptions() {
        return fetchOptionData(`${apiBase}/options/vehicles/`, (item) => ({
            value: item.value ?? item.id,
            label: item.label ?? `${item.name || "Vehicle"} (${item.vehicle_no || "-"})`,
        }));
    }

    async function fetchPlaceOptions() {
        return fetchOptionData(`${apiBase}/options/places/`, (item) => ({
            value: item.value ?? item.id,
            label: item.label ?? item.name,
        }));
    }

    async function fetchStaffUserOptions() {
        return fetchOptionData(`${apiBase}/staff/available-users/`, (item) => ({
            value: item.id,
            label: `${item.name || "Unknown"}${item.phone ? ` (${item.phone})` : ""}`,
        }));
    }

    async function fetchSeatOptions(vehicleId, bookingDateValue) {
        if (!vehicleId || !bookingDateValue) return [];
        const isoDate = encodeURIComponent(toIsoFromDateTimeLocal(bookingDateValue));
        return fetchOptionData(`${apiBase}/vehicles/${vehicleId}/available-seats/?date=${isoDate}`, (item) => {
            if (item.status !== "available") return null;
            return {
                value: item.id,
                label: `${String(item.floor || "").toUpperCase()} ${item.side}${item.number}`,
            };
        });
    }

    function toLabel(key) {
        return key.replace(/\./g, " ").replace(/_/g, " ").replace(/\b\w/g, (x) => x.toUpperCase());
    }

    function getValue(obj, path) {
        const value = path.split(".").reduce((acc, p) => (acc && acc[p] !== undefined ? acc[p] : undefined), obj);
        if (value === null || value === undefined || value === "") return "-";
        if (typeof value === "boolean") return value ? "Yes" : "No";
        if (typeof value === "number") return String(value);
        if (typeof value === "string") return value;
        if (Array.isArray(value)) return value.length ? value.map((v) => (typeof v === "object" ? v.name || v.id || "-" : v)).join(", ") : "-";
        if (typeof value === "object") return value.name || value.id || "-";
        return "-";
    }

    function getRawValue(obj, path) {
        return path.split(".").reduce((acc, p) => (acc && acc[p] !== undefined ? acc[p] : undefined), obj);
    }

    function getChipClass(value) {
        const normalized = String(value || "").toLowerCase();
        if (["yes", "true", "active", "booked", "boarded", "success", "completed"].includes(normalized)) return "travel-chip travel-chip-positive";
        if (["no", "false", "inactive", "cancelled", "failed", "rejected"].includes(normalized)) return "travel-chip travel-chip-negative";
        return "travel-chip travel-chip-neutral";
    }

    function formatFieldValue(row, field) {
        const raw = getRawValue(row, field);
        const display = getValue(row, field);
        const isBooleanLike = typeof raw === "boolean" || field.includes("permission") || field === "is_active" || field === "status";
        if (isBooleanLike) return `<span class="${getChipClass(display)}">${display}</span>`;
        return display;
    }

    function mobileCardSections(row, columns) {
        const groups = [
            { title: "Contact", matches: (f) => f.includes("phone") || f.includes("nationality") },
            { title: "Permissions", matches: (f) => f.includes("permission") },
            { title: "Details", matches: () => true },
        ];
        const reserved = new Set(["id", "name", "user.name", "status", "is_active"]);
        const available = columns.filter((f) => !reserved.has(f));
        const sections = [];
        const used = new Set();
        groups.forEach((group) => {
            const keys = available.filter((f) => !used.has(f) && group.matches(f));
            if (!keys.length) return;
            keys.forEach((k) => used.add(k));
            const rows = keys.map((field) => `
                <div class="travel-mobile-item">
                    <div class="travel-mobile-item-label">${toLabel(field)}</div>
                    <div class="travel-mobile-item-value">${formatFieldValue(row, field)}</div>
                </div>
            `).join("");
            sections.push(`
                <div class="travel-mobile-section">
                    <div class="travel-mobile-section-title">${group.title}</div>
                    ${rows}
                </div>
            `);
        });
        return sections.join("");
    }

    function flattenMetrics(stats) {
        const result = [];
        const grouped = [];
        const scalar = [];
        Object.entries(stats || {}).forEach(([groupKey, value]) => {
            if (value && typeof value === "object" && !Array.isArray(value)) {
                Object.entries(value).forEach(([metricKey, metricValue]) => {
                    grouped.push({
                        label: `${toLabel(groupKey)} ${toLabel(metricKey)}`,
                        value: metricValue,
                    });
                });
            } else {
                scalar.push({
                    label: toLabel(groupKey),
                    value: value,
                });
            }
        });
        result.push(...grouped, ...scalar);
        return result;
    }

    function renderKpis(stats) {
        const metrics = flattenMetrics(stats).slice(0, 16);
        el.kpiGrid.classList.toggle("kpi-scroll", metrics.length > 4);
        if (!metrics.length) {
            el.kpiGrid.innerHTML = `<div class="travel-card p-3 text-sm text-gray-500 col-span-full">No stats available.</div>`;
            return;
        }
        el.kpiGrid.innerHTML = metrics.map((metric) => `
            <div class="travel-stat p-3">
                <div class="text-xs text-gray-500">${metric.label}</div>
                <div class="text-lg font-bold text-gray-900 break-words">${getValue({ v: metric.value }, "v")}</div>
            </div>
        `).join("");
    }

    function renderDetailsCard(title, data, fields) {
        const rows = fields.map((field) =>
            `<div class="flex items-start justify-between gap-3 border-b last:border-b-0 py-2">
                <div class="text-sm text-gray-500">${toLabel(field)}</div>
                <div class="text-sm text-gray-900 text-right break-all">${getValue(data, field)}</div>
            </div>`
        ).join("");
        return `<div class="travel-card p-3">
            <h3 class="font-semibold text-gray-900 mb-2">${title}</h3>
            ${rows || `<div class="text-sm text-gray-500">No details available.</div>`}
        </div>`;
    }

    function renderTable(items, columns, actions) {
        if (!items || !items.length) {
            el.panelBody.innerHTML = `<div class="text-sm text-gray-500 p-2">No data found.</div>`;
            return;
        }
        const isMobile = window.matchMedia("(max-width: 767px)").matches;
        if (isMobile) {
            const rows = items.map((row, i) => {
                const idValue = getValue(row, "id");
                const primaryName = getValue(row, "user.name") !== "-" ? getValue(row, "user.name") : getValue(row, "name");
                const fallbackName = primaryName !== "-" ? primaryName : getValue(row, "ticket_number");
                const displayName = fallbackName !== "-" ? fallbackName : `Item #${idValue}`;
                const initials = displayName.split(" ").map((x) => x[0]).join("").slice(0, 2).toUpperCase();
                const statusValue = getValue(row, "status") !== "-" ? getValue(row, "status") : getValue(row, "is_active");
                const statusChip = statusValue !== "-" ? `<span class="${getChipClass(statusValue)}">${statusValue}</span>` : `<span class="travel-chip travel-chip-neutral">Info</span>`;
                const actionCell = actions
                    ? `<div class="travel-mobile-actions">${actions.map((a) =>
                        `<button data-row="${i}" data-act="${a.id}" class="travel-mobile-action-btn ${a.id === "delete" ? "delete" : ""}">${a.label}</button>`
                    ).join("")}</div>`
                    : "";
                return `
                    <div class="travel-mobile-row">
                        <div class="travel-mobile-head">
                            <div class="travel-mobile-profile">
                                <div class="travel-mobile-avatar">${initials || "NA"}</div>
                                <div>
                                    <div class="travel-mobile-name">${displayName}</div>
                                    <div class="travel-mobile-meta">User ID: ${idValue}</div>
                                </div>
                            </div>
                            ${statusChip}
                        </div>
                        <div class="travel-mobile-sections">${mobileCardSections(row, columns)}</div>
                        ${actionCell}
                    </div>
                `;
            }).join("");
            el.panelBody.innerHTML = `<div class="travel-mobile-list">${rows}</div>`;
            return;
        }
        const head = columns.map((c) => `<th class="text-left p-2 border-b text-xs uppercase text-gray-500">${toLabel(c)}</th>`).join("");
        const actionHead = actions ? `<th class="text-left p-2 border-b text-xs uppercase text-gray-500">Actions</th>` : "";
        const rows = items.map((row, i) => {
            const cells = columns.map((c) => `<td class="p-2 border-b text-sm">${getValue(row, c)}</td>`).join("");
            const actionCell = actions
                ? `<td class="p-2 border-b text-sm">${actions.map((a) =>
                    `<button data-row="${i}" data-act="${a.id}" class="mr-1 mb-1 text-xs px-2 py-1 rounded ${a.className || "bg-gray-100"}">${a.label}</button>`
                ).join("")}</td>`
                : "";
            return `<tr>${cells}${actionCell}</tr>`;
        }).join("");
        el.panelBody.innerHTML = `<table class="w-full min-w-[780px]"><thead><tr>${head}${actionHead}</tr></thead><tbody>${rows}</tbody></table>`;
    }

    function fieldInputHtml(field) {
        const required = field.required ? "required" : "";
        const disabled = field.disabled ? "disabled" : "";
        const helper = field.helpText ? `<p class="text-xs text-gray-500 mt-1">${escapeHtml(field.helpText)}</p>` : "";
        const value = field.value ?? "";
        if (field.type === "textarea") {
            return `<textarea data-field="${field.name}" name="${field.name}" class="w-full border border-gray-300 rounded-lg px-3 py-2" ${required} ${disabled}>${escapeHtml(value)}</textarea>${helper}`;
        }
        if (field.type === "checkbox") {
            return `<label class="inline-flex items-center gap-2">
                <input data-field="${field.name}" name="${field.name}" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-red-600" ${value ? "checked" : ""} ${disabled} />
                <span class="text-sm text-gray-700">${escapeHtml(field.checkboxLabel || "Enabled")}</span>
            </label>${helper}`;
        }
        if (field.type === "select" || field.type === "multiselect") {
            const multiple = field.type === "multiselect" || field.multiple ? "multiple" : "";
            const placeholderOption = field.placeholder && !multiple
                ? `<option value="">${escapeHtml(field.placeholder)}</option>`
                : "";
            const options = (field.options || []).map((o) =>
                `<option value="${escapeHtml(o.value)}" ${
                    Array.isArray(value)
                        ? (value.map(String).includes(String(o.value)) ? "selected" : "")
                        : (String(o.value) === String(value) ? "selected" : "")
                }>${escapeHtml(o.label)}</option>`).join("");
            return `<select data-field="${field.name}" name="${field.name}" class="w-full border border-gray-300 rounded-lg px-3 py-2" ${required} ${disabled} ${multiple}>${placeholderOption}${options}</select>${helper}`;
        }
        if (field.type === "file") {
            return `<input data-field="${field.name}" name="${field.name}" type="file" class="w-full border border-gray-300 rounded-lg px-3 py-2" ${required} ${disabled} ${field.accept ? `accept="${field.accept}"` : ""} />${helper}`;
        }
        return `<input data-field="${field.name}" name="${field.name}" type="${field.type || "text"}" value="${escapeHtml(value)}" class="w-full border border-gray-300 rounded-lg px-3 py-2" ${required} ${disabled} ${field.accept ? `accept="${field.accept}"` : ""} ${field.min !== undefined ? `min="${field.min}"` : ""} ${field.max !== undefined ? `max="${field.max}"` : ""} ${field.step !== undefined ? `step="${field.step}"` : ""} />${helper}`;
    }

    function openModal(title, fields, onSubmit, submitLabel, modalOptions) {
        const opts = modalOptions || {};
        el.modalTitle.textContent = title;
        el.modalForm.innerHTML = "";
        fields.forEach((field) => {
            const wrap = document.createElement("div");
            wrap.innerHTML = `<label class="block text-sm text-gray-700 mb-1">${field.label}</label>${fieldInputHtml(field)}`;
            el.modalForm.appendChild(wrap);
        });
        const btn = document.createElement("button");
        btn.type = "submit";
        btn.className = "bg-red-600 text-white px-4 py-2 rounded-lg";
        btn.textContent = submitLabel || "Save";
        el.modalForm.appendChild(btn);
        el.modalForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(el.modalForm);
            const payload = {};
            let hasFile = false;
            fields.forEach((field) => {
                const inputEl = el.modalForm.querySelector(`[data-field="${field.name}"]`);
                if (!inputEl) return;
                if (field.type === "checkbox") {
                    payload[field.name] = !!inputEl.checked;
                    return;
                }
                if (field.type === "file") {
                    const file = inputEl.files && inputEl.files[0] ? inputEl.files[0] : null;
                    if (file) {
                        payload[field.name] = file;
                        hasFile = true;
                    }
                    return;
                }
                if (field.type === "multiselect" || field.multiple) {
                    payload[field.name] = formData.getAll(field.name);
                    return;
                }
                payload[field.name] = formData.get(field.name);
            });
            try {
                await onSubmit(payload, { hasFile });
                closeModal();
                if (!opts.silentSuccess) {
                    showAlert("Saved successfully", "success");
                    await render();
                }
            } catch (err) {
                showAlert(parseApiErrorMessage(err), "error");
            }
        };
        el.modalRoot.classList.remove("hidden");
        el.modalRoot.classList.add("flex");
        return {
            form: el.modalForm,
            setFieldOptions: (fieldName, options, placeholder = "Select...") => {
                const selectEl = el.modalForm.querySelector(`select[data-field="${fieldName}"]`);
                if (!selectEl) return;
                const isMultiple = selectEl.multiple;
                const placeholderOption = isMultiple ? "" : `<option value="">${escapeHtml(placeholder)}</option>`;
                selectEl.innerHTML = `${placeholderOption}${(options || []).map((opt) => (
                    `<option value="${escapeHtml(opt.value)}">${escapeHtml(opt.label)}</option>`
                )).join("")}`;
                selectEl.disabled = !(options || []).length;
            },
            setFieldValue: (fieldName, value) => {
                const inputEl = el.modalForm.querySelector(`[data-field="${fieldName}"]`);
                if (!inputEl) return;
                if (inputEl.type === "checkbox") {
                    inputEl.checked = !!value;
                } else {
                    inputEl.value = value ?? "";
                }
            },
            getFieldValue: (fieldName) => {
                const inputEl = el.modalForm.querySelector(`[data-field="${fieldName}"]`);
                if (!inputEl) return "";
                if (inputEl.type === "checkbox") return inputEl.checked;
                return inputEl.value;
            },
        };
    }

    function parseApiErrorMessage(err) {
        if (!err) return "Request failed";
        const message = String(err.message || err);
        if (!message.startsWith("{")) return message;
        try {
            const parsed = JSON.parse(message);
            if (parsed.error) return String(parsed.error);
            if (parsed.detail) return String(parsed.detail);
            const firstKey = Object.keys(parsed)[0];
            if (!firstKey) return "Request failed";
            const firstVal = parsed[firstKey];
            if (Array.isArray(firstVal)) return `${toLabel(firstKey)}: ${firstVal[0]}`;
            if (typeof firstVal === "string") return `${toLabel(firstKey)}: ${firstVal}`;
            return `${toLabel(firstKey)}: ${JSON.stringify(firstVal)}`;
        } catch (_) {
            return message;
        }
    }

    function normalizeTimeForInput(timeValue) {
        const raw = String(timeValue || "");
        if (!raw) return "";
        return raw.length >= 5 ? raw.slice(0, 5) : raw;
    }

    function buildSeatPreviewHtml(seats) {
        const grouped = { upper: { A: [], B: [], C: [] }, lower: { A: [], B: [], C: [] } };
        (seats || []).forEach((seat) => {
            if (!grouped[seat.floor] || !grouped[seat.floor][seat.side]) return;
            grouped[seat.floor][seat.side].push(seat);
        });
        ["upper", "lower"].forEach((floor) => {
            ["A", "B", "C"].forEach((side) => {
                grouped[floor][side].sort((a, b) => a.number - b.number);
            });
        });
        return ["upper", "lower"].map((floor) => `
            <div class="border rounded-lg p-2">
                <div class="text-xs font-semibold text-gray-600 mb-1">${floor.toUpperCase()} FLOOR</div>
                <div class="grid grid-cols-3 gap-2 text-xs">
                    ${["A", "B", "C"].map((side) => `
                        <div class="rounded border p-2 bg-gray-50 min-h-[58px]">
                            <div class="font-semibold text-gray-600 mb-1">Side ${side}</div>
                            <div class="flex flex-wrap gap-1">
                                ${(grouped[floor][side] || []).map((seat) => {
                                    const cls = seat.status === "boarded"
                                        ? "bg-red-100 text-red-700 border-red-300"
                                        : seat.status === "booked"
                                            ? "bg-yellow-100 text-yellow-700 border-yellow-300"
                                            : "bg-green-100 text-green-700 border-green-300";
                                    return `<span class="inline-flex text-[10px] border rounded px-1.5 py-0.5 ${cls}">${seat.side}${seat.number}</span>`;
                                }).join("") || `<span class="text-gray-400">-</span>`}
                            </div>
                        </div>
                    `).join("")}
                </div>
            </div>
        `).join("");
    }

    function openVehicleModal(mode, row, placeOptions) {
        const isEdit = mode === "edit";
        const seats = Array.isArray(row?.seats)
            ? row.seats.map((seat) => ({
                floor: seat.floor || "lower",
                side: seat.side || "A",
                number: Number(seat.number || 1),
                status: seat.status || "available",
            }))
            : [];
        const removedImageIds = new Set();
        const existingImages = Array.isArray(row?.images) ? row.images : [];

        el.modalTitle.textContent = isEdit ? "Update Vehicle" : "Create Vehicle";
        el.modalForm.innerHTML = `
            <div>
                <label class="block text-sm text-gray-700 mb-1">Name</label>
                <input data-field="name" name="name" type="text" required class="w-full border border-gray-300 rounded-lg px-3 py-2" value="${escapeHtml(row?.name || "")}" />
            </div>
            <div>
                <label class="block text-sm text-gray-700 mb-1">Vehicle No</label>
                <input data-field="vehicle_no" name="vehicle_no" type="text" required class="w-full border border-gray-300 rounded-lg px-3 py-2" value="${escapeHtml(row?.vehicle_no || "")}" />
            </div>
            <div>
                <label class="block text-sm text-gray-700 mb-1">From Place</label>
                <select data-field="from_place" name="from_place" required class="w-full border border-gray-300 rounded-lg px-3 py-2">
                    <option value="">Select origin place</option>
                    ${placeOptions.map((opt) => `<option value="${escapeHtml(opt.value)}" ${String(opt.value) === String(row?.from_place?.id || "") ? "selected" : ""}>${escapeHtml(opt.label)}</option>`).join("")}
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-700 mb-1">To Place</label>
                <select data-field="to_place" name="to_place" required class="w-full border border-gray-300 rounded-lg px-3 py-2">
                    <option value="">Select destination place</option>
                    ${placeOptions.map((opt) => `<option value="${escapeHtml(opt.value)}" ${String(opt.value) === String(row?.to_place?.id || "") ? "selected" : ""}>${escapeHtml(opt.label)}</option>`).join("")}
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-700 mb-1">Departure Time</label>
                <input data-field="departure_time" name="departure_time" type="time" required class="w-full border border-gray-300 rounded-lg px-3 py-2" value="${escapeHtml(normalizeTimeForInput(row?.departure_time || ""))}" />
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm text-gray-700 mb-1">Actual Seat Price</label>
                    <input data-field="actual_seat_price" name="actual_seat_price" type="number" min="0" step="0.01" required class="w-full border border-gray-300 rounded-lg px-3 py-2" value="${escapeHtml(row?.actual_seat_price ?? "")}" />
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">Seat Price</label>
                    <input data-field="seat_price" name="seat_price" type="number" min="0" step="0.01" required class="w-full border border-gray-300 rounded-lg px-3 py-2" value="${escapeHtml(row?.seat_price ?? "")}" />
                </div>
            </div>
            <div class="border rounded-lg p-3 bg-gray-50">
                <div class="flex items-center justify-between mb-2">
                    <div class="text-sm font-semibold text-gray-800">Seat Layout Designer</div>
                    <span id="seatCountLabel" class="text-xs px-2 py-1 rounded bg-white border text-gray-700">Seats: 0</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <select id="seatFloorInput" class="border border-gray-300 rounded px-2 py-2 text-sm">
                        <option value="lower">Lower</option>
                        <option value="upper">Upper</option>
                    </select>
                    <select id="seatSideInput" class="border border-gray-300 rounded px-2 py-2 text-sm">
                        <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                    </select>
                    <input id="seatNumberInput" type="number" min="1" placeholder="Seat No" class="border border-gray-300 rounded px-2 py-2 text-sm" />
                    <select id="seatStatusInput" class="border border-gray-300 rounded px-2 py-2 text-sm">
                        <option value="available">Available</option>
                        <option value="booked">Booked</option>
                        <option value="boarded">Boarded</option>
                    </select>
                </div>
                <div class="mt-2 flex items-center gap-2">
                    <button id="addSeatBtn" type="button" class="px-3 py-1.5 rounded bg-red-600 text-white text-sm">Add Seat</button>
                    <button id="clearSeatsBtn" type="button" class="px-3 py-1.5 rounded border text-sm text-gray-700">Clear Seats</button>
                </div>
                <div id="seatPreviewRoot" class="mt-3 grid gap-2"></div>
                <div id="seatListRoot" class="mt-2 flex flex-wrap gap-2"></div>
            </div>
            <div>
                <label class="block text-sm text-gray-700 mb-1">Primary Vehicle Image (optional)</label>
                <input data-field="image" name="image" type="file" accept="image/*" class="w-full border border-gray-300 rounded-lg px-3 py-2" />
            </div>
            <div>
                <label class="block text-sm text-gray-700 mb-1">Vehicle Images (multiple)</label>
                <input data-field="images" name="images" type="file" multiple accept="image/*" class="w-full border border-gray-300 rounded-lg px-3 py-2" />
                <p class="text-xs text-gray-500 mt-1">You can select multiple files at once.</p>
            </div>
            ${isEdit && existingImages.length ? `
                <div class="border rounded-lg p-3 bg-gray-50">
                    <div class="text-sm font-semibold text-gray-800 mb-2">Existing Images</div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                        ${existingImages.map((img, index) => `
                            <label class="flex items-center gap-2 border rounded p-2 bg-white">
                                <input type="checkbox" data-remove-image-id="${img.id}" class="h-4 w-4" />
                                <span class="text-xs text-gray-700">Remove image #${index + 1}${img.title ? ` (${escapeHtml(img.title)})` : ""}</span>
                            </label>
                        `).join("")}
                    </div>
                </div>
            ` : ""}
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded-lg">${isEdit ? "Update" : "Save"}</button>
        `;

        const seatCountLabel = el.modalForm.querySelector("#seatCountLabel");
        const seatPreviewRoot = el.modalForm.querySelector("#seatPreviewRoot");
        const seatListRoot = el.modalForm.querySelector("#seatListRoot");
        const seatFloorInput = el.modalForm.querySelector("#seatFloorInput");
        const seatSideInput = el.modalForm.querySelector("#seatSideInput");
        const seatNumberInput = el.modalForm.querySelector("#seatNumberInput");
        const seatStatusInput = el.modalForm.querySelector("#seatStatusInput");

        function syncSeatView() {
            seatCountLabel.textContent = `Seats: ${seats.length}`;
            seatPreviewRoot.innerHTML = buildSeatPreviewHtml(seats);
            seatListRoot.innerHTML = seats
                .slice()
                .sort((a, b) => `${a.floor}-${a.side}-${a.number}`.localeCompare(`${b.floor}-${b.side}-${b.number}`))
                .map((seat) => {
                    const seatKey = `${seat.floor}|${seat.side}|${seat.number}`;
                    const cls = seat.status === "boarded"
                        ? "bg-red-100 text-red-700 border-red-300"
                        : seat.status === "booked"
                            ? "bg-yellow-100 text-yellow-700 border-yellow-300"
                            : "bg-green-100 text-green-700 border-green-300";
                    return `
                        <span class="inline-flex items-center gap-1 border rounded-full px-2 py-1 text-xs ${cls}">
                            ${seat.floor.toUpperCase()} ${seat.side}${seat.number}
                            <button type="button" data-seat-remove-key="${seatKey}" class="text-gray-600 hover:text-gray-900">&times;</button>
                        </span>
                    `;
                }).join("");
            seatListRoot.querySelectorAll("[data-seat-remove-key]").forEach((btn) => {
                btn.addEventListener("click", () => {
                    const key = String(btn.dataset.seatRemoveKey || "");
                    if (!key) return;
                    const [floor, side, numberStr] = key.split("|");
                    const number = parseInt(numberStr, 10);
                    const idx = seats.findIndex((seat) => (
                        seat.floor === floor &&
                        seat.side === side &&
                        seat.number === number
                    ));
                    if (idx === -1) return;
                    seats.splice(idx, 1);
                    syncSeatView();
                });
            });
        }

        el.modalForm.querySelector("#addSeatBtn")?.addEventListener("click", () => {
            const floor = String(seatFloorInput.value || "lower");
            const side = String(seatSideInput.value || "A");
            const number = parseInt(seatNumberInput.value, 10);
            const status = String(seatStatusInput.value || "available");
            if (!number || number < 1) {
                showAlert("Seat number must be at least 1.", "warning");
                return;
            }
            const duplicate = seats.some((seat) => seat.floor === floor && seat.side === side && seat.number === number);
            if (duplicate) {
                showAlert(`Duplicate seat detected: ${floor.toUpperCase()} ${side}${number}`, "warning");
                return;
            }
            seats.push({ floor, side, number, status });
            seatNumberInput.value = "";
            syncSeatView();
        });

        el.modalForm.querySelector("#clearSeatsBtn")?.addEventListener("click", () => {
            seats.splice(0, seats.length);
            syncSeatView();
        });

        el.modalForm.querySelectorAll("[data-remove-image-id]").forEach((checkboxEl) => {
            checkboxEl.addEventListener("change", () => {
                const imageId = parseInt(checkboxEl.dataset.removeImageId, 10);
                if (!imageId) return;
                if (checkboxEl.checked) {
                    removedImageIds.add(imageId);
                } else {
                    removedImageIds.delete(imageId);
                }
            });
        });

        syncSeatView();

        el.modalForm.onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                name: el.modalForm.querySelector('[data-field="name"]')?.value || "",
                vehicle_no: el.modalForm.querySelector('[data-field="vehicle_no"]')?.value || "",
                from_place: el.modalForm.querySelector('[data-field="from_place"]')?.value || "",
                to_place: el.modalForm.querySelector('[data-field="to_place"]')?.value || "",
                departure_time: el.modalForm.querySelector('[data-field="departure_time"]')?.value || "",
                actual_seat_price: el.modalForm.querySelector('[data-field="actual_seat_price"]')?.value || "",
                seat_price: el.modalForm.querySelector('[data-field="seat_price"]')?.value || "",
                seats: seats.map((seat) => ({ ...seat })),
            };
            const primaryImageInput = el.modalForm.querySelector('[data-field="image"]');
            const imagesInput = el.modalForm.querySelector('[data-field="images"]');
            const primaryImageFile = primaryImageInput?.files?.[0] || null;
            const multiFiles = imagesInput?.files ? Array.from(imagesInput.files) : [];
            const hasFiles = !!primaryImageFile || multiFiles.length > 0;
            const hasRemoveImages = removedImageIds.size > 0;

            try {
                if (hasFiles || hasRemoveImages) {
                    const formData = new FormData();
                    Object.entries(payload).forEach(([key, value]) => {
                        if (key === "seats") {
                            formData.append("seats", JSON.stringify(value));
                            return;
                        }
                        if (value === null || value === undefined || value === "") return;
                        formData.append(key, value);
                    });
                    if (primaryImageFile) {
                        formData.append("image", primaryImageFile);
                    }
                    if (multiFiles.length) {
                        multiFiles.forEach((file) => formData.append("images", file));
                        formData.append("image_titles", JSON.stringify(multiFiles.map((file) => file.name || "")));
                    }
                    if (removedImageIds.size) {
                        formData.append("remove_image_ids", JSON.stringify(Array.from(removedImageIds)));
                    }
                    await api(isEdit ? `${apiBase}/vehicles/${row.id}/` : `${apiBase}/vehicles/`, {
                        method: isEdit ? "PATCH" : "POST",
                        body: formData,
                    });
                } else {
                    await api(isEdit ? `${apiBase}/vehicles/${row.id}/` : `${apiBase}/vehicles/`, {
                        method: isEdit ? "PATCH" : "POST",
                        body: JSON.stringify(payload),
                    });
                }
                closeModal();
                showAlert(`Vehicle ${isEdit ? "updated" : "created"} successfully.`, "success");
                await render();
            } catch (err) {
                showAlert(parseApiErrorMessage(err), "error");
            }
        };

        el.modalRoot.classList.remove("hidden");
        el.modalRoot.classList.add("flex");
    }

    function closeModal() {
        el.modalRoot.classList.add("hidden");
        el.modalRoot.classList.remove("flex");
    }

    function actionButton(label, cb, cls) {
        const btn = document.createElement("button");
        btn.className = cls || "bg-red-600 text-white px-3 py-2 rounded-lg text-sm";
        btn.textContent = label;
        btn.onclick = cb;
        el.panelActions.appendChild(btn);
    }

    function bindRowActions(actionsMap) {
        const btns = el.panelBody.querySelectorAll("button[data-row][data-act]");
        btns.forEach((btn) => btn.addEventListener("click", async () => {
            const row = state.pageData[parseInt(btn.dataset.row, 10)];
            const fn = actionsMap[btn.dataset.act];
            if (!row || !fn) return;
            try { await fn(row); } catch (err) { showAlert(parseApiErrorMessage(err), "error"); }
        }));
    }

    function matchesSearch(item) {
        if (!state.query) return true;
        return Object.values(item || {}).some((v) => String(v).toLowerCase().includes(state.query.toLowerCase()));
    }

    function roleTabs() {
        const tabs = tabsByRole[role] || ["dashboard"];
        if (role !== "travel_staff" || !state.session?.staff) return tabs;
        return tabs.filter((t) => {
            if (t === "bookings") return !!state.session.staff.booking_permission;
            if (t === "boarding") return !!state.session.staff.boarding_permission;
            if (t === "revenue") return !!state.session.staff.finance_permission;
            return true;
        });
    }

    function openDrawer() {
        el.drawerBackdrop.classList.add("open");
        el.appDrawer.classList.add("open");
    }

    function closeDrawer() {
        el.drawerBackdrop.classList.remove("open");
        el.appDrawer.classList.remove("open");
    }

    function renderNav() {
        const tabs = roleTabs();
        const bottomTabs = (bottomBarItemsByRole[role] || []).filter((tab) => tabs.includes(tab) || tab === "profile");
        const renderBtn = (tab, mode) =>
            `<button data-tab="${tab}" class="${
                mode === "bottom"
                        ? "travel-bottom-item px-1 py-2 text-[11px] text-gray-700"
                        : "travel-drawer-item w-full text-left px-3 py-2 rounded-lg text-sm"
            } ${state.tab === tab ? "active text-red-600 font-semibold" : "text-gray-700"}">
                ${mode === "bottom" ? `<span>${tabIcons[tab] || ""}</span>` : ""}
                <span>${tabLabel[tab] || tab}</span>
            </button>`;
        el.desktopMenu.innerHTML = tabs.map((t) => renderBtn(t, "desktop")).join("");
        el.drawerMenu.innerHTML = tabs.map((t) => renderBtn(t, "drawer")).join("");
        el.bottomBarMenu.innerHTML = bottomTabs.map((t) => renderBtn(t, "bottom")).join("");
        el.bottomBarMenu.style.gridTemplateColumns = `repeat(${Math.max(bottomTabs.length, 1)}, minmax(0, 1fr))`;
        el.appBarTitle.textContent = tabLabel[state.tab] || "Dashboard";
        if (state.tab !== "dashboard") {
            el.appBarBackBtn.classList.remove("hidden");
        } else {
            el.appBarBackBtn.classList.add("hidden");
        }
    }

    async function handleTabSelection(tab) {
        if (!tab) return;
        if (tab === "profile") {
            window.location.href = "{% url 'website:travel_profile' %}";
            return;
        }
        state.tab = tab;
        closeDrawer();
        await render();
    }

    async function loadDashboard() {
        const endpoint = {
            travel_committee: `${apiBase}/dashboard/committee/`,
            travel_staff: `${apiBase}/dashboard/staff/`,
            travel_dealer: `${apiBase}/dashboard/dealer/`,
            agent: `${apiBase}/dashboard/agent/`,
        }[role];
        const data = await api(endpoint);
        renderKpis(data.stats || data.widgets || {});
        const profileKey = data.committee ? "committee" : data.staff ? "staff" : data.dealer ? "dealer" : "agent";
        const profile = data[profileKey] || {};
        const fields = dashboardProfileFields[role] || ["id"];
        const summary = renderDetailsCard("Role Summary", profile, fields);
        const balance = renderDetailsCard("Quick Snapshot", { balance: data.balance || data.stats?.balance || "-" }, ["balance"]);
        el.panelBody.innerHTML = `<div class="grid md:grid-cols-2 gap-3">${summary}${balance}</div>`;
    }

    async function loadBookings() {
        const data = await api(`${apiBase}/bookings/`);
        state.pageData = (data || []).filter(matchesSearch);
        renderKpis({});
        const actions = [{ id: "view", label: "View", className: "bg-blue-50" }, { id: "ticket", label: "Ticket", className: "bg-green-50" }];
        if (role === "travel_committee" || role === "travel_staff") actions.unshift({ id: "edit", label: "Edit", className: "bg-yellow-50" });
        renderTable(state.pageData, tableSchemas.bookings, actions);
        actionButton("Refresh Bookings", render);
        if (role === "agent" || (role === "travel_staff" && state.session?.staff?.booking_permission)) {
            actionButton("Create Booking", openCreateBookingModal);
        }
        bindRowActions({
            view: async (row) => showAlert(`Ticket: ${row.ticket_number || row.id}`, "success"),
            ticket: async (row) => window.open(`${apiBase}/bookings/${row.id}/ticket/`, "_blank"),
            edit: async (row) => openModal("Update Booking", [
                { name: "name", label: "Name", value: row.name, required: true },
                { name: "phone", label: "Phone", type: "tel", value: row.phone, required: true },
                { name: "status", label: "Status", type: "select", value: row.status, options: ["pending", "booked", "boarded", "cancelled"].map((s) => ({ value: s, label: s })) },
                { name: "remarks", label: "Remarks", type: "textarea", value: row.remarks || "" },
            ], (payload) => api(`${apiBase}/bookings/${row.id}/`, { method: "PATCH", body: JSON.stringify(payload) }), "Update"),
        });
    }

    async function openCreateBookingModal() {
        const vehicleOptions = await fetchVehicleOptions();
        const modal = openModal("Create Booking", [
            { name: "vehicle", label: "Vehicle", type: "select", required: true, options: vehicleOptions, placeholder: "Select vehicle" },
            { name: "seat_ids", label: "Seats", type: "multiselect", required: true, options: [], disabled: true, helpText: "Select vehicle and booking date first" },
            { name: "booking_date", label: "Booking Date & Time", type: "datetime-local", required: true },
            { name: "name", label: "Passenger Name", required: true },
            { name: "phone", label: "Phone", type: "tel", required: true },
            { name: "gender", label: "Gender", type: "select", options: [{ value: "male", label: "male" }, { value: "female", label: "female" }], required: true },
            { name: "nationality", label: "Nationality" },
            { name: "remarks", label: "Remarks", type: "textarea" },
        ], (payload) => {
            const seatIds = (payload.seat_ids || []).map((x) => parseInt(x, 10)).filter(Boolean);
            return api(`${apiBase}/bookings/create/`, {
                method: "POST",
                body: JSON.stringify({
                    ...payload,
                    booking_date: toIsoFromDateTimeLocal(payload.booking_date),
                    seat_ids: seatIds,
                }),
            });
        });

        const refreshSeats = async () => {
            const vehicleId = modal.getFieldValue("vehicle");
            const bookingDate = modal.getFieldValue("booking_date");
            if (!vehicleId || !bookingDate) {
                modal.setFieldOptions("seat_ids", [], "Select vehicle and date first");
                return;
            }
            try {
                const seatOptions = await fetchSeatOptions(vehicleId, bookingDate);
                modal.setFieldOptions("seat_ids", seatOptions, "No seats available");
            } catch (err) {
                modal.setFieldOptions("seat_ids", [], "Unable to load seats");
                showAlert(err.message, "warning");
            }
        };

        modal.form.querySelector('[data-field="vehicle"]')?.addEventListener("change", refreshSeats);
        modal.form.querySelector('[data-field="booking_date"]')?.addEventListener("change", refreshSeats);
    }

    async function loadVehicles() {
        const data = await api(`${apiBase}/vehicles/`);
        state.pageData = (data || []).filter(matchesSearch);
        renderTable(
            state.pageData,
            tableSchemas.vehicles,
            role === "travel_committee" ? [
                { id: "edit", label: "Edit", className: "bg-yellow-50" },
                { id: "delete", label: "Delete", className: "bg-red-50" },
            ] : null
        );
        if (role === "travel_committee") {
            actionButton("Add Vehicle", async () => {
                const placeOptions = await fetchPlaceOptions();
                openVehicleModal("create", null, placeOptions);
            });
        }
        bindRowActions({
            edit: async (row) => {
                const placeOptions = await fetchPlaceOptions();
                openVehicleModal("edit", row, placeOptions);
            },
            delete: async (row) => {
                if (!window.confirm(`Delete/deactivate ${row.name}?`)) return;
                await api(`${apiBase}/vehicles/${row.id}/`, { method: "DELETE" });
                showAlert("Vehicle action completed.", "success");
                await render();
            },
        });
    }

    async function loadBoarding() {
        const data = await api(`${apiBase}/boarding/`);
        state.pageData = (data || []).filter(matchesSearch);
        renderTable(state.pageData, tableSchemas.boarding, [{ id: "confirm", label: "Confirm", className: "bg-green-50" }]);
        actionButton("Scan Ticket", () => openModal("Scan Ticket", [
            { name: "ticket_number", label: "Ticket Number", required: true },
        ], (payload) => api(`${apiBase}/boarding/scan/`, { method: "POST", body: JSON.stringify(payload) })));
        bindRowActions({
            confirm: async (row) => {
                await api(`${apiBase}/boarding/${row.id}/confirm/`, { method: "POST", body: JSON.stringify({}) });
                showAlert("Boarding confirmed", "success");
                await render();
            },
        });
    }

    async function loadStaff() {
        const data = await api(`${apiBase}/staff/`);
        state.pageData = (data || []).filter(matchesSearch);
        renderTable(state.pageData, tableSchemas.staff, [
            { id: "edit", label: "Edit", className: "bg-yellow-50" },
            { id: "delete", label: "Delete", className: "bg-red-50" },
        ]);
        actionButton("Add Staff", async () => {
            const userOptions = await fetchStaffUserOptions();
            openModal("Create Staff", [
                { name: "user", label: "User", type: "select", required: true, options: userOptions, placeholder: "Select user" },
                { name: "booking_permission", label: "Booking Permission", type: "checkbox", value: false },
                { name: "boarding_permission", label: "Boarding Permission", type: "checkbox", value: false },
                { name: "finance_permission", label: "Finance Permission", type: "checkbox", value: false },
            ], (payload) => api(`${apiBase}/staff/create/`, {
                method: "POST",
                body: JSON.stringify(payload),
            }));
        });
        bindRowActions({
            edit: async (row) => openModal("Update Staff", [
                { name: "booking_permission", label: "Booking Permission", type: "checkbox", value: row.booking_permission },
                { name: "boarding_permission", label: "Boarding Permission", type: "checkbox", value: row.boarding_permission },
                { name: "finance_permission", label: "Finance Permission", type: "checkbox", value: row.finance_permission },
            ], (payload) => api(`${apiBase}/staff/${row.id}/`, {
                method: "PATCH",
                body: JSON.stringify(payload),
            }), "Update"),
            delete: async (row) => {
                if (!window.confirm("Delete staff member?")) return;
                await api(`${apiBase}/staff/${row.id}/`, { method: "DELETE" });
                showAlert("Staff removed", "success");
                await render();
            },
        });
    }

    async function loadAgents() {
        const data = await api(`${apiBase}/agents/`);
        state.pageData = (data || []).filter(matchesSearch);
        renderTable(state.pageData, tableSchemas.agents, null);
    }

    async function loadRevenue() {
        const [stats, history] = await Promise.all([api(`${apiBase}/revenue/stats/`), api(`${apiBase}/revenue/history/`)]);
        renderKpis(stats);
        state.pageData = (history || []).filter(matchesSearch);
        renderTable(state.pageData, tableSchemas.revenue, null);
    }

    function paymentMethodCanEdit(pmData) {
        if (!pmData) return true;
        if (typeof pmData.can_edit === "boolean") return pmData.can_edit;
        return pmData.status === "pending" || pmData.status === "rejected";
    }

    function paymentMethodFormFields(pmData) {
        const pt = pmData?.payment_method_type || "bank_account";
        const d = pmData?.payment_details || {};
        return [
            { name: "payment_method_type", label: "Method type", type: "select", required: true, options: [
                { value: "bank_account", label: "Bank account" },
                { value: "upi", label: "UPI" },
                { value: "wallet", label: "Wallet" },
            ], value: pt },
            { name: "account_number", label: "Account number (bank)", value: d.account_number || "", helpText: "Required when type is Bank account" },
            { name: "ifsc", label: "IFSC (bank)", value: d.ifsc || "" },
            { name: "bank_name", label: "Bank name", value: d.bank_name || "" },
            { name: "account_holder_name", label: "Account holder name (bank)", value: d.account_holder_name || "" },
            { name: "vpa", label: "UPI VPA", value: d.vpa || d.upi_id || "", helpText: "Required when type is UPI" },
            { name: "wallet_type", label: "Wallet type (e.g. eSewa, Khalti)", value: d.wallet_type || "", helpText: "Required when type is Wallet" },
            { name: "wallet_id", label: "Wallet ID / phone", value: d.wallet_id || "" },
            { name: "wallet_provider", label: "Wallet provider (optional)", value: d.wallet_provider || "" },
        ];
    }

    function paymentMethodReadOnlyFields(pmData) {
        const fields = paymentMethodFormFields(pmData);
        return fields.map((f) => ({ ...f, disabled: true, required: false }));
    }

    function buildPaymentMethodApiBody(payload) {
        const t = payload.payment_method_type;
        if (t === "bank_account") {
            const account_number = String(payload.account_number || "").trim();
            const ifsc = String(payload.ifsc || "").trim();
            const bank_name = String(payload.bank_name || "").trim();
            const account_holder_name = String(payload.account_holder_name || "").trim();
            if (!account_number || !ifsc || !bank_name || !account_holder_name) {
                throw new Error("Bank account: account number, IFSC, bank name, and account holder name are required.");
            }
            return {
                payment_method_type: "bank_account",
                payment_details: {
                    account_number,
                    ifsc: ifsc.toUpperCase(),
                    bank_name,
                    account_holder_name,
                },
            };
        }
        if (t === "upi") {
            const vpa = String(payload.vpa || "").trim();
            if (!vpa) throw new Error("UPI: VPA is required.");
            return {
                payment_method_type: "upi",
                payment_details: { vpa, upi_id: vpa },
            };
        }
        if (t === "wallet") {
            const wallet_type = String(payload.wallet_type || "").trim();
            const wallet_id = String(payload.wallet_id || "").trim();
            if (!wallet_type || !wallet_id) throw new Error("Wallet: type and wallet ID are required.");
            const wallet_provider = String(payload.wallet_provider || "").trim() || wallet_type;
            return {
                payment_method_type: "wallet",
                payment_details: { wallet_type, wallet_id, wallet_provider },
            };
        }
        throw new Error("Select a valid method type.");
    }

    async function loadWallet() {
        let pm = null;
        try {
            pm = await api(`${coreApiBase}/merchant/payment-method/`);
        } catch (_) {
            pm = { success: false, data: null };
        }
        const wd = await api(`${coreApiBase}/merchant/withdrawals/`).catch(() => ({ results: [] }));
        const pmData = pm && pm.success && pm.data ? pm.data : null;
        const canEditPm = paymentMethodCanEdit(pmData);
        const pmStatusLabel = pmData
            ? (pmData.status_display || pmData.status || "—")
            : "Not configured";
        const pmValueDetail = pmData
            ? `${pmData.payment_method_type_display || pmData.payment_method_type || ""} — ${pmData.status_display || pmData.status || ""}${canEditPm ? "" : " (locked — contact admin to change)"}`
            : "No payout method on file. Add bank, UPI, or wallet for withdrawals.";
        const rows = [{
            section: "payment_method",
            name: "Payment details",
            id: null,
            amount: null,
            status: pmStatusLabel,
            created_at: null,
            value: pmValueDetail,
        }, ...((wd.results || wd.data || []))];
        state.pageData = rows.filter(matchesSearch);
        renderTable(state.pageData, tableSchemas.wallet, null);

        if (pmData && !canEditPm) {
            actionButton("View payment details", () => {
                openModal("Payment method (approved)", paymentMethodReadOnlyFields(pmData), async () => {}, "Close", { silentSuccess: true });
            }, "bg-gray-700 text-white px-3 py-2 rounded-lg text-sm");
        }
        if (!pmData) {
            actionButton("Add payment method", () => openModal("Add payment method", paymentMethodFormFields(null), async (payload) => {
                const body = buildPaymentMethodApiBody(payload);
                await api(`${coreApiBase}/merchant/payment-method/create/`, { method: "POST", body: JSON.stringify(body) });
            }), "bg-red-600 text-white px-3 py-2 rounded-lg text-sm");
        } else if (canEditPm) {
            actionButton("Edit payment method", () => openModal("Edit payment method", paymentMethodFormFields(pmData), async (payload) => {
                const body = buildPaymentMethodApiBody(payload);
                await api(`${coreApiBase}/merchant/payment-method/update/`, { method: "PUT", body: JSON.stringify(body) });
            }), "bg-red-600 text-white px-3 py-2 rounded-lg text-sm");
            actionButton("Delete payment method", async () => {
                if (!confirm("Delete your saved payment method? You can add a new one after.")) return;
                try {
                    await api(`${coreApiBase}/merchant/payment-method/delete/`, { method: "DELETE" });
                    showAlert("Payment method deleted.", "success");
                    await render();
                } catch (err) {
                    showAlert(parseApiErrorMessage(err), "error");
                }
            }, "bg-gray-700 text-white px-3 py-2 rounded-lg text-sm");
        }
        actionButton("Create Withdrawal", () => openModal("Create Withdrawal", [
            { name: "amount", label: "Amount", type: "number", min: "0", step: "0.01", required: true },
        ], (payload) => api(`${coreApiBase}/merchant/withdrawals/create/`, { method: "POST", body: JSON.stringify(payload) })));
    }

    async function render() {
        clearAlert();
        renderNav();
        el.panelActions.innerHTML = "";
        el.panelTitle.textContent = state.tab.replace("-", " ").toUpperCase();
        el.panelBody.innerHTML = `<div class="text-sm text-gray-500 p-2">Loading...</div>`;
        try {
            if (state.tab === "dashboard") return await loadDashboard();
            if (state.tab === "bookings") return await loadBookings();
            if (state.tab === "vehicles") return await loadVehicles();
            if (state.tab === "boarding") return await loadBoarding();
            if (state.tab === "staff") return await loadStaff();
            if (state.tab === "agents") return await loadAgents();
            if (state.tab === "revenue") return await loadRevenue();
            if (state.tab === "wallet") return await loadWallet();
            if (state.tab === "create-booking") return await openCreateBookingModal();
        } catch (err) {
            showAlert(err.message, "error");
            el.panelBody.innerHTML = `<div class="text-sm text-red-600 p-2">Failed to load data.</div>`;
        }
    }

    async function bootstrapSession() {
        const session = await api(`${apiBase}/session/`);
        state.session = session;
        const allowed = {
            travel_committee: session.is_travel_committee,
            travel_staff: session.is_travel_staff,
            travel_dealer: session.is_travel_dealer,
            agent: session.is_agent,
        };
        if (!allowed[role]) {
            const dest = allowed.travel_committee ? "/app/travel-committee/"
                : allowed.travel_staff ? "/app/travel-committee-staff/"
                : allowed.travel_dealer ? "/app/travel-dealer/"
                : allowed.agent ? "/app/agent/" : "/dashboard/";
            showAlert("Role mismatch. Redirecting...", "warning");
            setTimeout(() => { window.location.href = dest; }, 700);
            return false;
        }
        return true;
    }

    el.refreshBtn.addEventListener("click", async () => { await render(); });
    el.appBarBackBtn.addEventListener("click", async () => {
        state.tab = "dashboard";
        await render();
    });
    el.appBarMenuBtn.addEventListener("click", openDrawer);
    el.drawerCloseBtn.addEventListener("click", closeDrawer);
    el.drawerBackdrop.addEventListener("click", closeDrawer);
    document.addEventListener("click", async (e) => {
        const tabButton = e.target.closest("[data-tab]");
        if (!tabButton) return;
        await handleTabSelection(tabButton.dataset.tab);
    });
    el.searchInput.addEventListener("input", async (e) => {
        state.query = e.target.value || "";
        await render();
    });
    el.modalClose.addEventListener("click", closeModal);
    el.modalRoot.addEventListener("click", (e) => { if (e.target === el.modalRoot) closeModal(); });

    (async function init() {
        try {
            const ok = await bootstrapSession();
            if (!ok) return;
            state.tab = roleTabs()[0] || "dashboard";
            await render();
        } catch (err) {
            showAlert(err.message, "error");
        }
    })();
})();
</script>
</body>
</html>
